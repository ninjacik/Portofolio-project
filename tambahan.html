<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Grid - Portofolio Digital</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
    
    <style>
        :root {
            --black: #0a0a0a;
            --white: #f5f5f0;
            --gray-soft: #1a1a1a;
            --gray-mid: #2e2e2e;
            --gray-line: #2a2a2a;
        }

        body {
            background-color: var(--black);
            color: var(--white);
            font-family: 'DM Mono', monospace;
            padding: 50px 20px;
            margin: 0;
        }

        #projects {
            max-width: 1200px;
            margin: 0 auto;
        }

        .projects-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 4rem;
        }

        .projects-title {
            font-family: 'DM Serif Display', serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            line-height: 1.1;
        }

        .projects-count {
            font-size: 11px;
            color: #444;
            letter-spacing: 0.12em;
        }

        /* ── PROJECT CARD ── */
        .project-card {
            border: 1px solid var(--gray-line);
            background: var(--gray-soft);
            transition: all 0.3s ease;
            cursor: pointer;
            overflow: hidden;
            position: relative;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .project-card:hover {
            border-color: #555;
            transform: translateY(-4px);
        }

        .project-thumb {
            width: 100%;
            aspect-ratio: 16/9;
            background: var(--gray-mid);
            position: relative;
            overflow: hidden;
        }

        .project-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(0.5);
            transition: filter 0.4s;
        }

        .project-card:hover .project-thumb img {
            filter: grayscale(0);
        }

        .project-body {
            padding: 1.5rem;
            border-top: 1px solid var(--gray-line);
            flex-grow: 1;
        }

        .project-index {
            font-size: 10px;
            color: #444;
            margin-bottom: 0.6rem;
        }

        .project-name {
            font-family: 'DM Serif Display', serif;
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
        }

        .project-desc {
            font-size: 12px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .tag {
            font-size: 9px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 2px 8px;
            border: 1px solid var(--gray-line);
            color: #555;
            margin-right: 4px;
        }

        .project-arrow {
            position: absolute;
            top: 1.2rem; right: 1.2rem;
            width: 32px; height: 32px;
            border: 1px solid var(--gray-line);
            display: flex; align-items: center; justify-content: center;
            color: #444;
            transition: all 0.2s;
        }

        .project-card:hover .project-arrow {
            border-color: var(--white);
            color: var(--white);
        }

        /* ── ADD PROJECT BUTTON ── */
        .add-project {
            border: 1px dashed var(--gray-line);
            height: 100%;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            color: #333;
            text-decoration: none;
            transition: all 0.3s;
        }

        .add-project:hover {
            border-color: #555;
            color: #777;
            background: var(--gray-soft);
        }

        .add-icon {
            width: 45px; height: 45px;
            border: 1px solid var(--gray-line);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
            border-radius: 50%;
        }
    </style>
</head>
<body>

<section id="projects" class="container">

    <div class="projects-header">
        <h2 class="projects-title">Koleksi Proyek</h2>
        <!-- <span class="projects-count">04 Item</span> -->
    </div>

    <div class="row g-4">
        <div class="col-12 col-md-6 col-lg-4">
            <div class="project-card">
                <div class="project-thumb">
                    <a href="https://github.com/ninjacik/flexbox-pricing-table"><img src="./image/project4.png" alt=""></a>
                    <div style="background:#222; width:100%; height:100%;"></div>
                </div>
                <div class="project-body">
                    <div class="project-index">04</div>
                    <div class="project-name">Flexbox Pricing Table Sederhana</div>
                    <p class="project-desc">Pricing table menggunakan Flexbox dari CSS</p>
                    <div class="project-tags">
                        <span class="tag">HTML</span>
                        <span class="tag">CSS</span>
                    </div>
                </div>
                <div class="project-arrow">↗</div>
            </div>
        </div>

        <div class="col-12 col-md-6 col-lg-4">
            <div class="project-card">
                <div class="project-thumb">
                    <a href="https://anti-gambler.vercel.app/"><img src="./image/project5.png" alt=""></a>
                    <div style="background:#1a1a1a; width:100%; height:100%;"></div>
                </div>
                <div class="project-body">
                    <div class="project-index">05</div>
                    <div class="project-name">Anti Gambler UI</div>
                    <p class="project-desc">Desain user interface dari project extension anti gambler</p>
                    <div class="project-tags">
                        <span class="tag">HTML</span>
                        <span class="tag">CSS</span>
                    </div>
                </div>
                <div class="project-arrow">↗</div>
            </div>
        </div>

        <div class="col-12 col-md-6 col-lg-4">
            <div class="project-card">
                <div class="project-thumb">
                    <a href="https://www.figma.com/board/JsOOln2a0BmZuKW2ztmSOx/TBO?node-id=0-1&t=pzDHbXBXmsinjKqb-1"><img src="./image/project6.png" alt=""></a>
                    <div style="background:#252525; width:100%; height:100%;"></div>
                </div>
                <div class="project-body">
                    <div class="project-index">06</div>
                    <div class="project-name">Desain Alur Diagram State</div>
                    <p class="project-desc">Project matakuliah TBO pada semester 3</p>
                    <div class="project-tags">
                        <span class="tag">CSS</span>
                        <span class="tag">WEB</span>
                    </div>
                </div>
                <div class="project-arrow">↗</div>
            </div>
        </div>

        <!-- <div class="col-12 col-md-6 col-lg-4">
            <a href="#" class="add-project">
                <div class="add-icon">+</div>
                <span style="font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;">Tambah Proyek Baru</span>
            </a>
        </div> -->
    </div>
</section>

</body>
</html>
